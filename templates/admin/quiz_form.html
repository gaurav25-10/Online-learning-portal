{% extends "base.html" %}
{% set title = "Edit Quiz Question" if question else "Add Quiz Question" %}
{% set heading = title %}
{% block content %}
<div class="feature-card p-4">
  <form method="post" class="row g-3">
    <div class="col-12">
      <label class="form-label">Course</label>
      <select class="form-select" name="course_id" required>
        {% for course in courses %}<option value="{{ course.id }}" {% if question and question.course_id == course.id %}selected{% endif %}>{{ course.title }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-12"><label class="form-label">Question</label><textarea class="form-control" name="question" rows="3" required>{{ question.question if question else '' }}</textarea></div>
    <div class="col-md-6"><label class="form-label">Option A</label><input class="form-control" name="option_a" value="{{ question.option_a if question else '' }}" required></div>
    <div class="col-md-6"><label class="form-label">Option B</label><input class="form-control" name="option_b" value="{{ question.option_b if question else '' }}" required></div>
    <div class="col-md-6"><label class="form-label">Option C</label><input class="form-control" name="option_c" value="{{ question.option_c if question else '' }}" required></div>
    <div class="col-md-6"><label class="form-label">Option D</label><input class="form-control" name="option_d" value="{{ question.option_d if question else '' }}" required></div>
    <div class="col-md-6">
      <label class="form-label">Correct Answer</label>
      <select class="form-select" name="correct_answer">{% for answer in ["A", "B", "C", "D"] %}<option value="{{ answer }}" {% if question and question.correct_answer == answer %}selected{% endif %}>{{ answer }}</option>{% endfor %}</select>
    </div>
    <div class="col-12"><button class="btn btn-primary">Save Question</button> <a class="btn btn-outline-secondary" href="{{ url_for('admin_quiz') }}">Cancel</a></div>
  </form>
</div>
{% endblock %}
