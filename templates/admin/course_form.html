{% extends "base.html" %}
{% set title = "Edit Course" if course else "Add Course" %}
{% set heading = title %}
{% block content %}
<div class="feature-card p-4">
  <form method="post" enctype="multipart/form-data" class="row g-3">
    <div class="col-md-6"><label class="form-label">Course Title</label><input class="form-control" name="title" value="{{ course.title if course else '' }}" required></div>
    <div class="col-md-6"><label class="form-label">Category</label><input class="form-control" name="category" value="{{ course.category if course else '' }}" required></div>
    <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="4" required>{{ course.description if course else '' }}</textarea></div>
    <div class="col-md-6"><label class="form-label">Thumbnail Image</label><input class="form-control" type="file" name="thumbnail" accept="image/png,image/jpeg,image/webp"></div>
    <div class="col-md-6"><label class="form-label">Video Link</label><input class="form-control" name="video_link" value="{{ course.video_link if course else '' }}"></div>
    <div class="col-12"><label class="form-label">PDF Notes Link</label><input class="form-control" name="pdf_link" value="{{ course.pdf_link if course else '' }}"></div>
    <div class="col-12"><button class="btn btn-primary">Save Course</button> <a class="btn btn-outline-secondary" href="{{ url_for('admin_courses') }}">Cancel</a></div>
  </form>
</div>
{% endblock %}
