{% extends "base.html" %}
{% block public_content %}
<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="feature-card p-4">
        <h1 class="h3 fw-bold mb-3">Student Registration</h1>
        <form method="post" class="vstack gap-3">
          <div><label class="form-label">Full Name</label><input class="form-control" name="name" required></div>
          <div><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
          <div><label class="form-label">Phone</label><input class="form-control" name="phone"></div>
          <div><label class="form-label">Password</label><input class="form-control" type="password" name="password" minlength="6" required></div>
          <button class="btn btn-primary w-100">Create Account</button>
        </form>
      </div>
    </div>
  </div>
</main>
{% endblock %}
